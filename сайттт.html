<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Собери рюкзак - игра для стенда</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1e5a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .game-box {
            background: #f9e7b3;
            border-radius: 50px;
            padding: 20px;
            max-width: 1300px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 40px;
            color: #2c2b28;
        }
        .info {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .timer, .score {
            background: #2d2b26;
            padding: 10px 25px;
            border-radius: 50px;
            color: #ffec9f;
            font-size: 30px;
            font-weight: bold;
        }
        .timer span, .score span {
            font-size: 18px;
        }
        .play-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        .backpack {
            background: #bc9a6c;
            width: 300px;
            min-height: 300px;
            border-radius: 40px;
            border: 4px solid #6b3f1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .backpack-title {
            font-size: 50px;
            margin-top: 10px;
        }
        .backpack-inner {
            background: #fbeccd;
            width: 90%;
            min-height: 200px;
            border-radius: 30px;
            margin: 10px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        .backpack-item {
            background: #fff0cc;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .items-grid {
            background: #e9dbbd;
            border-radius: 50px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            min-width: 400px;
        }
        .item {
            background: #fffaf0;
            padding: 12px 8px;
            border-radius: 25px;
            text-align: center;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 5px 0 #c29a6b;
            transition: 0.05s linear;
        }
        .item:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c29a6b;
        }
        .item span {
            display: block;
            font-size: 12px;
            margin-top: 5px;
            color: #5a3a1a;
        }
        .message {
            margin: 15px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            background: #fff3cf;
            border-radius: 40px;
            min-height: 70px;
        }
        button {
            background: #f5bc70;
            border: none;
            font-size: 22px;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 40px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 5px 0 #8b5a2e;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2e;
        }
        .qr-area {
            display: inline-block;
            background: white;
            padding: 10px;
            border-radius: 20px;
            margin-left: 15px;
            text-align: center;
        }
        .qr-area img {
            width: 80px;
            height: 80px;
        }
        @media (max-width: 800px) {
            .items-grid { grid-template-columns: repeat(3, 1fr); }
            .item { font-size: 28px; padding: 8px; }
            h1 { font-size: 28px; }
        }
        @media (max-width: 550px) {
            .items-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="game-box">
    <h1>СОБЕРИ РЮКЗАК В ШКОЛУ</h1>
    <div class="info">
        <div class="timer"><span>⏱️ Время:</span> <span id="time">30</span> с</div>
        <div class="score"><span>🎒 Собрано:</span> <span id="collected">0</span> / 7</div>
    </div>

    <div class="play-area">
        <div class="backpack">
            <div class="backpack-title">🎒</div>
            <div class="backpack-inner" id="backpackInner"></div>
        </div>
        <div class="items-grid" id="itemsGrid"></div>
    </div>

    <div class="message" id="message">Нажми на предмет - он добавится в рюкзак! Нужно собрать 7 вещей</div>
    <button id="resetBtn">🔄 НОВАЯ ИГРА</button>
</div>

<script>
    // ========== МНОГО ПРЕДМЕТОВ (20 штук) ==========
    // Правильных - 7, неправильных - 13
    const allItems = [
        // ПРАВИЛЬНЫЕ школьные предметы (7 штук)
        { name: "тетрадь", emoji: "📓", correct: true },
        { name: "пенал", emoji: "✏️", correct: true },
        { name: "бутылка воды", emoji: "💧", correct: true },
        { name: "ключи", emoji: "🔑", correct: true },
        { name: "телефон", emoji: "📱", correct: true },
        { name: "учебник", emoji: "📚", correct: true },
        { name: "линейка", emoji: "📏", correct: true },
        
        // НЕПРАВИЛЬНЫЕ (отвлекающие) предметы (13 штук)
        { name: "кот", emoji: "🐱", correct: false },
        { name: "пицца", emoji: "🍕", correct: false },
        { name: "игрушка", emoji: "🧸", correct: false },
        { name: "телевизор", emoji: "📺", correct: false },
        { name: "кровать", emoji: "🛏️", correct: false },
        { name: "гитара", emoji: "🎸", correct: false },
        { name: "велосипед", emoji: "🚲", correct: false },
        { name: "торт", emoji: "🎂", correct: false },
        { name: "подушка", emoji: "🛌", correct: false },
        { name: "плейстейшен", emoji: "🎮", correct: false },
        { name: "зонт", emoji: "☂️", correct: false },
        { name: "гамбургер", emoji: "🍔", correct: false },
        { name: "сноуборд", emoji: "🏂", correct: false }
    ];

    let score = 0;          
    let timeLeft = 30;      
    let gameActive = true;   
    let timerId = null;      
    let usedItems = [];      

    const backpackInner = document.getElementById("backpackInner");
    const itemsGrid = document.getElementById("itemsGrid");
    const timeSpan = document.getElementById("time");
    const collectedSpan = document.getElementById("collected");
    const messageDiv = document.getElementById("message");
    const resetBtn = document.getElementById("resetBtn");

    // Отрисовать все доступные предметы
    function renderItems() {
        const available = allItems.filter(item => !usedItems.includes(item.name));
        itemsGrid.innerHTML = "";
        for (let i = 0; i < available.length; i++) {
            const item = available[i];
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = item.emoji + "<span>" + item.name + "</span>";
            div.onclick = (function(itemData) {
                return function() { addToBackpack(itemData.name, itemData.emoji, itemData.correct); };
            })(item);
            itemsGrid.appendChild(div);
        }
    }

    // Добавить предмет в рюкзак
    function addToBackpack(name, emoji, isCorrect) {
        if (!gameActive) {
            messageDiv.innerHTML = "❌ Игра закончена! Нажми НОВАЯ ИГРА";
            return;
        }
        if (timeLeft <= 0) {
            gameOver(false, "⏰ Время вышло! Ты не успел собрать рюкзак...");
            return;
        }
        if (score >= 7) {
            gameOver(true, "🎉 ПОБЕДА! Ты собрал полный рюкзак! 🎉");
            return;
        }

        if (usedItems.includes(name)) {
            messageDiv.innerHTML = "⚠️ " + emoji + " " + name + " уже в рюкзаке! Ищи другой предмет";
            return;
        }

        if (!isCorrect) {
            messageDiv.innerHTML = "❌ НЕПРАВИЛЬНО! " + emoji + " " + name + " не нужен в школе! Ищи дальше...";
            return;
        }

        // правильный предмет - добавляем
        usedItems.push(name);
        score++;
        collectedSpan.innerText = score;

        const chip = document.createElement("div");
        chip.className = "backpack-item";
        chip.innerHTML = emoji + " " + name;
        backpackInner.appendChild(chip);

        messageDiv.innerHTML = "✅ ПРАВИЛЬНО! " + emoji + " " + name + " в рюкзаке! Осталось собрать " + (7 - score) + " вещей";

        renderItems();

        if (score >= 7) {
            gameOver(true, "🏆 ПОБЕДА! Ты молодец!");
        }
    }

    function gameOver(isWin, text) {
        if (!gameActive) return;
        gameActive = false;
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
        }
        messageDiv.innerHTML = text;
        if (isWin) {
            showQRCode();
        }
    }

    function showQRCode() {
        const url = "https://example.com/coloring.pdf";
        const oldQR = document.getElementById("dynamicQR");
        if (oldQR) oldQR.remove();

        const qrContainer = document.createElement("div");
        qrContainer.id = "dynamicQR";
        qrContainer.className = "qr-area";
        
        const img = document.createElement("img");
        img.src = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(url);
        img.width = 80;
        img.height = 80;
        img.alt = "QR-код";
        
        qrContainer.appendChild(img);
        const label = document.createElement("div");
        label.innerText = "🎨 Скачай раскраску";
        label.style.fontSize = "12px";
        label.style.marginTop = "5px";
        qrContainer.appendChild(label);
        
        messageDiv.appendChild(qrContainer);
    }

    function updateTimerDisplay() {
        timeSpan.innerText = timeLeft;
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        timerId = setInterval(function() {
            if (!gameActive) return;
            if (timeLeft <= 1) {
                timeLeft = 0;
                updateTimerDisplay();
                gameOver(false, "⏰ Время вышло! Нажми НОВАЯ ИГРА, чтобы попробовать снова");
                if (timerId) clearInterval(timerId);
                timerId = null;
            } else {
                timeLeft--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function resetGame() {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
        }
        score = 0;
        timeLeft = 30;
        gameActive = true;
        usedItems = [];
        collectedSpan.innerText = "0";
        updateTimerDisplay();
        backpackInner.innerHTML = "";
        messageDiv.innerHTML = "🆕 Новая игра! Собери 7 школьных предметов за 30 секунд!";
        const oldQR = document.getElementById("dynamicQR");
        if (oldQR) oldQR.remove();
        renderItems();
        startTimer();
    }

    resetBtn.onclick = function() {
        resetGame();
    };

    resetGame();
</script>
</body>
</html>
